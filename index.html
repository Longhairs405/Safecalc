<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SafeCalc — Real Engine</title>
<link rel="manifest" href="./manifest.webmanifest">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a14; font-family: 'Roboto', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
  .calc { width: 100%; max-width: 400px; background: #12121f; border-radius: 20px; padding: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  .display { background: #050510; border-radius: 12px; padding: 16px; margin-bottom: 12px; text-align: right; min-height: 70px; }
  .display .input { color: #888; font-size: 16px; word-break: break-all; }
  .display .result { color: #fff; font-size: 32px; font-weight: bold; margin-top: 4px; }
  .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  button { background: #1a1a2e; border: none; border-radius: 12px; color: #fff; font-size: 20px; padding: 16px 0; cursor: pointer; transition: 0.2s; }
  button:active { background: #2a2a4e; transform: scale(0.95); }
  button.orange { background: #6b3a10; }
  button.green { background: #1a4a1a; }
  button.red { background: #4a1a1a; }
  button.phi { background: #3a2a4a; }
  .tabs { display: flex; gap: 8px; margin-bottom: 8px; }
  .tab { flex: 1; padding: 8px; font-size: 12px; background: #1a1a2e; border-radius: 8px; text-align: center; color: #aaa; cursor: pointer; }
  .tab.active { background: #2a2a4e; color: #fff; }
  .hidden { display: none; }
  .row { display: flex; gap: 8px; margin-bottom: 8px; }
  .row input, .row select { flex: 1; padding: 10px; border-radius: 8px; border: none; background: #1a1a2e; color: #fff; font-size: 14px; }
  .row button { padding: 10px 16px; font-size: 14px; }
</style>
</head>
<body>
<div class="calc">
  <div class="display">
    <div class="input" id="input">0</div>
    <div class="result" id="result">0</div>
  </div>
  
  <div class="tabs">
    <div class="tab active" onclick="switchTab('calc')">Calc</div>
    <div class="tab" onclick="switchTab('sci')">Sci</div>
    <div class="tab" onclick="switchTab('tools')">Tools</div>
  </div>

  <div id="tab-calc">
    <div class="buttons">
      <button onclick="append('7')">7</button><button onclick="append('8')">8</button><button onclick="append('9')">9</button><button class="orange" onclick="append('÷')">÷</button>
      <button onclick="append('4')">4</button><button onclick="append('5')">5</button><button onclick="append('6')">6</button><button class="orange" onclick="append('×')">×</button>
      <button onclick="append('1')">1</button><button onclick="append('2')">2</button><button onclick="append('3')">3</button><button class="orange" onclick="append('-')">−</button>
      <button onclick="append('0')">0</button><button onclick="append('.')">.</button><button class="green" onclick="calculate()">=</button><button class="orange" onclick="append('+')">+</button>
      <button class="red" onclick="clearAll()">C</button><button onclick="append('(')">(</button><button onclick="append(')')">)</button><button class="phi" onclick="append('1.618')">φ</button>
    </div>
    <div class="buttons" style="grid-template-columns: repeat(4,1fr); margin-top:8px;">
      <button onclick="memory('M+')">M+</button><button onclick="memory('MR')">MR</button><button onclick="memory('MC')">MC</button><button onclick="undo()">⌫</button>
    </div>
  </div>

  <div id="tab-sci" class="hidden">
    <div class="buttons">
      <button onclick="append('sin(')">sin</button><button onclick="append('cos(')">cos</button><button onclick="append('tan(')">tan</button><button onclick="append('log(')">log</button>
      <button onclick="append('sqrt(')">√</button><button onclick="append('exp(')">exp</button><button onclick="append('**')">x^y</button><button onclick="append('pi')">π</button><button onclick="append('e')">e</button>
      <button onclick="append('%')">%</button><button onclick="append('fact(')">fact</button><button onclick="append('rad(')">rad</button><button onclick="append('deg(')">deg</button>
    </div>
  </div>

  <div id="tab-tools" class="hidden">
    <div class="row"><input type="number" id="tax-amount" placeholder="Amount"><input type="number" id="tax-rate" placeholder="Rate %"><button class="orange" onclick="calcTax()">Tax</button></div>
    <div class="row"><input type="number" id="tip-amount" placeholder="Bill"><input type="number" id="tip-rate" placeholder="Tip %"><button class="orange" onclick="calcTip()">Tip</button></div>
    <div class="row"><input type="number" id="len-val" placeholder="Value"><select id="len-from"><option>mi</option><option>km</option><option>ft</option><option>m</option></select><select id="len-to"><option>km</option><option>mi</option><option>m</option><option>ft</option></select><button class="orange" onclick="convertLength()">→</button></div>
    <div class="row"><input type="number" id="temp-val" placeholder="Temp"><select id="temp-from"><option>F</option><option>C</option><option>K</option></select><select id="temp-to"><option>C</option><option>F</option><option>K</option></select><button class="orange" onclick="convertTemp()">→</button></div>
    <div class="row"><input type="number" id="comp-principal" placeholder="Principal"><input type="number" id="comp-rate" placeholder="Rate %"><input type="number" id="comp-years" placeholder="Years"><button class="orange" onclick="compound()">FV</button></div>
  </div>
</div>

<script>
  (function() {
    // ----  ROCK‑SOLID EXPRESSION EVALUATOR ----
    var UmbrilFloat = (function() {
      function UF(val) {
        this.val = Number(val);
        if (isNaN(this.val)) throw "Not a number";
        this.shadow = Math.abs(this.val) * Number.EPSILON;
      }
      UF.prototype = {
        add: function(o) {
          if (!(o instanceof UF)) o = new UF(o);
          var r = Object.create(UF.prototype);
          r.val = this.val + o.val;
          r.shadow = this.shadow + o.shadow;
          return r;
        },
        sub: function(o) {
          if (!(o instanceof UF)) o = new UF(o);
          return this.add(new UF(-o.val));
        },
        mul: function(o) {
          if (!(o instanceof UF)) o = new UF(o);
          var r = Object.create(UF.prototype);
          r.val = this.val * o.val;
          r.shadow = Math.abs(this.val) * o.shadow + Math.abs(o.val) * this.shadow + this.shadow * o.shadow;
          return r;
        },
        div: function(o) {
          if (!(o instanceof UF)) o = new UF(o);
          var r = Object.create(UF.prototype);
          r.val = this.val / o.val;
          r.shadow = (Math.abs(this.val) * o.shadow) / Math.max(o.val*o.val, 1e-300) + this.shadow / Math.max(Math.abs(o.val), 1e-300);
          return r;
        },
        toString: function() {
          if (Math.abs(this.val) < 1e-12) return "0";
          var s = this.val.toPrecision(15);
          if (s.indexOf('.') !== -1) s = s.replace(/\.?0+$/, '');
          return s;
        }
      };
      return UF;
    })();

    // --- Tokenizer ---
    function tokenize(expr) {
      var tokens = [];
      var i = 0;
      while (i < expr.length) {
        var ch = expr[i];
        if (ch === ' ') { i++; continue; }
        if ((ch >= '0' && ch <= '9') || ch === '.') {
          var num = '';
          while (i < expr.length && ((expr[i] >= '0' && expr[i] <= '9') || expr[i] === '.')) {
            num += expr[i++];
          }
          tokens.push({type: 'num', value: parseFloat(num)});
          continue;
        }
        if (ch === '(') { tokens.push({type: 'lparen'}); i++; continue; }
        if (ch === ')') { tokens.push({type: 'rparen'}); i++; continue; }
        if (ch === '+' || ch === '-' || ch === '*' || ch === '/' || ch === '^') {
          tokens.push({type: 'op', value: ch}); i++; continue;
        }
        // Names: functions, constants
        var names = ['sqrt','sin','cos','tan','log','exp','fact','rad','deg','pi','e'];
        var found = false;
        for (var f = 0; f < names.length; f++) {
          var fn = names[f];
          if (expr.substr(i, fn.length) === fn) {
            if (fn === 'pi') tokens.push({type: 'num', value: Math.PI});
            else if (fn === 'e') tokens.push({type: 'num', value: Math.E});
            else tokens.push({type: 'func', value: fn});
            i += fn.length;
            found = true;
            break;
          }
        }
        if (found) continue;
        i++; // skip unknown char
      }
      return tokens;
    }

    // --- Recursive‑descent parser with correct precedence ---
    function parseAddSub(tokens, pos) {
      var left = parseMulDiv(tokens, pos);
      while (left.pos < tokens.length) {
        var tok = tokens[left.pos];
        if (tok.type === 'op' && (tok.value === '+' || tok.value === '-')) {
          pos = left.pos + 1;
          var right = parseMulDiv(tokens, pos);
          left = { node: {type:'op', op:tok.value, left:left.node, right:right.node}, pos: right.pos };
        } else break;
      }
      return left;
    }

    function parseMulDiv(tokens, pos) {
      var left = parsePower(tokens, pos);
      while (left.pos < tokens.length) {
        var tok = tokens[left.pos];
        if (tok.type === 'op' && (tok.value === '*' || tok.value === '/')) {
          pos = left.pos + 1;
          var right = parsePower(tokens, pos);
          left = { node: {type:'op', op:tok.value, left:left.node, right:right.node}, pos: right.pos };
        } else break;
      }
      return left;
    }

    function parsePower(tokens, pos) {
      var left = parseUnary(tokens, pos);
      while (left.pos < tokens.length) {
        var tok = tokens[left.pos];
        if (tok.type === 'op' && tok.value === '^') {
          pos = left.pos + 1;
          var right = parseUnary(tokens, pos);  // right‑associative
          left = { node: {type:'op', op:'^', left:left.node, right:right.node}, pos: right.pos };
        } else break;
      }
      return left;
    }

    function parseUnary(tokens, pos) {
      if (tokens[pos].type === 'op' && (tokens[pos].value === '-' || tokens[pos].value === '+')) {
        var arg = parseAtom(tokens, pos + 1);
        if (tokens[pos].value === '-') {
          return { node: {type:'unary', op:'-', expr: arg.node}, pos: arg.pos };
        } else {
          return arg;  // unary + is a no‑op
        }
      }
      return parseAtom(tokens, pos);
    }

    function parseAtom(tokens, pos) {
      var tok = tokens[pos];
      if (tok.type === 'num') {
        return { node: {type:'num', value: tok.value}, pos: pos + 1 };
      }
      if (tok.type === 'func') {
        if (pos+1 >= tokens.length || tokens[pos+1].type !== 'lparen') throw "Missing (";
        var arg = parseAddSub(tokens, pos + 2);
        if (tokens[arg.pos].type !== 'rparen') throw "Missing )";
        return { node: {type:'func', name: tok.value, arg: arg.node}, pos: arg.pos + 1 };
      }
      if (tok.type === 'lparen') {
        var inner = parseAddSub(tokens, pos + 1);
        if (tokens[inner.pos].type !== 'rparen') throw "Missing )";
        return { node: inner.node, pos: inner.pos + 1 };
      }
      throw "Unexpected token";
    }

    function evalNode(node) {
      switch (node.type) {
        case 'num': return new UmbrilFloat(node.value);
        case 'op':
          var left = evalNode(node.left);
          var right = evalNode(node.right);
          if (node.op === '+') return left.add(right);
          if (node.op === '-') return left.sub(right);
          if (node.op === '*') return left.mul(right);
          if (node.op === '/') return left.div(right);
          if (node.op === '^') return new UmbrilFloat(Math.pow(Number(left), Number(right)));
          throw "Unknown op";
        case 'unary':
          var sub = evalNode(node.expr);
          return new UmbrilFloat(-sub.val);
        case 'func':
          var arg = evalNode(node.arg);
          var val = Number(arg);
          switch (node.name) {
            case 'sqrt': return new UmbrilFloat(Math.sqrt(val));
            case 'sin':  return new UmbrilFloat(Math.sin(val));
            case 'cos':  return new UmbrilFloat(Math.cos(val));
            case 'tan':  return new UmbrilFloat(Math.tan(val));
            case 'log':  return new UmbrilFloat(Math.log(val));
            case 'exp':  return new UmbrilFloat(Math.exp(val));
            case 'fact':
              if (val < 0 || !Number.isInteger(val)) return new UmbrilFloat(NaN);
              var r = 1; for (var i = 2; i <= val; i++) r *= i;
              return new UmbrilFloat(r);
            case 'rad': return new UmbrilFloat(val * Math.PI / 180);
            case 'deg': return new UmbrilFloat(val * 180 / Math.PI);
            default: throw "Unknown function";
          }
        default: throw "Bad node";
      }
    }

    function safeCalculate(expr) {
      try {
        // Replace symbols and fix x^y button
        expr = expr.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-');
        expr = expr.replace(/\*\*/g, '^');  // x^y button fix
        expr = expr.replace(/(\d)\(/g, '$1*(');  // implicit multiplication like 2(3)
        var tokens = tokenize(expr);
        var ast = parseAddSub(tokens, 0);
        return evalNode(ast.node).toString();
      } catch (e) {
        return 'Error';
      }
    }

    // ---- UI (unchanged) ----
    window.input = '0';
    window.memoryVal = 0;
    window.lastResult = '0';
    window.updateDisplay = function() {
      document.getElementById('input').textContent = window.input || '0';
      document.getElementById('result').textContent = window.lastResult;
    };
    window.append = function(s) {
      if (window.input === '0' && s !== '.') window.input = '';
      window.input += s;
      window.updateDisplay();
    };
    window.clearAll = function() { window.input = '0'; window.lastResult = '0'; window.updateDisplay(); };
    window.undo = function() { window.input = window.input.slice(0, -1); if (!window.input) window.input = '0'; window.updateDisplay(); };
    window.calculate = function() {
      if (!window.input) return;
      var openCount = (window.input.match(/\(/g) || []).length;
      var closeCount = (window.input.match(/\)/g) || []).length;
      var expr = window.input + ')'.repeat(openCount - closeCount);
      var result = safeCalculate(expr);
      window.lastResult = result;
      window.input = result;
      window.updateDisplay();
    };
    window.memory = function(action) {
      var val = parseFloat(window.lastResult);
      if (isNaN(val)) val = 0;
      if (action === 'M+') window.memoryVal += val;
      else if (action === 'MR') { window.input = String(window.memoryVal); window.lastResult = window.input; }
      else if (action === 'MC') window.memoryVal = 0;
      window.updateDisplay();
    };
    window.switchTab = function(tab) {
      ['calc','sci','tools'].forEach(function(t) {
        document.getElementById('tab-'+t).classList.add('hidden');
      });
      document.getElementById('tab-'+tab).classList.remove('hidden');
      var tabs = document.querySelectorAll('.tab');
      for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
      event.target.classList.add('active');
    };
    window.calcTax = function() {
      var a = +document.getElementById('tax-amount').value;
      var r = +document.getElementById('tax-rate').value || 8.5;
      var total = a * (1 + r/100);
      window.lastResult = total.toFixed(2);
      window.input = String(window.lastResult);
      window.updateDisplay();
    };
    window.calcTip = function() {
      var a = +document.getElementById('tip-amount').value;
      var r = +document.getElementById('tip-rate').value || 18;
      var total = a * (1 + r/100);
      window.lastResult = total.toFixed(2);
      window.input = String(window.lastResult);
      window.updateDisplay();
    };
    window.convertLength = function() {
      var v = +document.getElementById('len-val').value;
      var from = document.getElementById('len-from').value;
      var to = document.getElementById('len-to').value;
      var toM = { mi: 1609.344, km: 1000, ft: 0.3048, m: 1 };
      var fromM = { mi: 1/1609.344, km: 1/1000, ft: 1/0.3048, m: 1 };
      var meters = v * toM[from];
      var result = meters * fromM[to];
      window.lastResult = result.toFixed(4);
      window.input = String(window.lastResult);
      window.updateDisplay();
    };
    window.convertTemp = function() {
      var v = +document.getElementById('temp-val').value;
      var from = document.getElementById('temp-from').value;
      var to = document.getElementById('temp-to').value;
      var celsius;
      if (from === 'C') celsius = v;
      else if (from === 'F') celsius = (v - 32) * 5/9;
      else celsius = v - 273.15;
      var result;
      if (to === 'C') result = celsius;
      else if (to === 'F') result = celsius * 9/5 + 32;
      else result = celsius + 273.15;
      window.lastResult = result.toFixed(2);
      window.input = String(window.lastResult);
      window.updateDisplay();
    };
    window.compound = function() {
      var P = +document.getElementById('comp-principal').value;
      var r = (+document.getElementById('comp-rate').value || 5) / 100;
      var t = +document.getElementById('comp-years').value || 1;
      var A = P * Math.pow(1 + r, t);
      window.lastResult = A.toFixed(2);
      window.input = String(window.lastResult);
      window.updateDisplay();
    };
    window.updateDisplay();
  })();
</script>
</body>
</html>
