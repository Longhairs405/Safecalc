<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SafeCalc</title>
<link rel="manifest" href="./manifest.webmanifest">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a14; font-family: 'Roboto', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
  .calc { width: 100%; max-width: 400px; background: #12121f; border-radius: 20px; padding: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  .display { background: #050510; border-radius: 12px; padding: 16px; margin-bottom: 12px; text-align: right; min-height: 70px; }
  .display .input { color: #888; font-size: 16px; word-break: break-all; }
  .display .result { color: #fff; font-size: 32px; font-weight: bold; margin-top: 4px; }
  .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  button { background: #1a1a2e; border: none; border-radius: 12px; color: #fff; font-size: 20px; padding: 16px 0; cursor: pointer; transition: 0.2s; }
  button:active { background: #2a2a4e; transform: scale(0.95); }
  button.orange { background: #6b3a10; }
  button.green { background: #1a4a1a; }
  button.red { background: #4a1a1a; }
  button.phi { background: #3a2a4a; }
  .tabs { display: flex; gap: 8px; margin-bottom: 8px; }
  .tab { flex: 1; padding: 8px; font-size: 12px; background: #1a1a2e; border-radius: 8px; text-align: center; color: #aaa; cursor: pointer; }
  .tab.active { background: #2a2a4e; color: #fff; }
  .hidden { display: none; }
  .row { display: flex; gap: 8px; margin-bottom: 8px; }
  .row input, .row select { flex: 1; padding: 10px; border-radius: 8px; border: none; background: #1a1a2e; color: #fff; font-size: 14px; }
  .row button { padding: 10px 16px; font-size: 14px; }
</style>
</head>
<body>
<div class="calc">
  <div class="display">
    <div class="input" id="input">0</div>
    <div class="result" id="result">0</div>
  </div>
  
  <div class="tabs">
    <div class="tab active" onclick="switchTab('calc')">Calc</div>
    <div class="tab" onclick="switchTab('sci')">Sci</div>
    <div class="tab" onclick="switchTab('tools')">Tools</div>
  </div>

  <div id="tab-calc">
    <div class="buttons">
      <button onclick="append('7')">7</button><button onclick="append('8')">8</button><button onclick="append('9')">9</button><button class="orange" onclick="append('÷')">÷</button>
      <button onclick="append('4')">4</button><button onclick="append('5')">5</button><button onclick="append('6')">6</button><button class="orange" onclick="append('×')">×</button>
      <button onclick="append('1')">1</button><button onclick="append('2')">2</button><button onclick="append('3')">3</button><button class="orange" onclick="append('-')">−</button>
      <button onclick="append('0')">0</button><button onclick="append('.')">.</button><button class="green" onclick="calculate()">=</button><button class="orange" onclick="append('+')">+</button>
      <button class="red" onclick="clearAll()">C</button><button onclick="append('(')">(</button><button onclick="append(')')">)</button><button class="phi" onclick="append('1.618')">φ</button>
    </div>
    <div class="buttons" style="grid-template-columns: repeat(4,1fr); margin-top:8px;">
      <button onclick="memory('M+')">M+</button><button onclick="memory('MR')">MR</button><button onclick="memory('MC')">MC</button><button onclick="undo()">⌫</button>
    </div>
  </div>

  <div id="tab-sci" class="hidden">
    <div class="buttons">
      <button onclick="append('sin(')">sin</button><button onclick="append('cos(')">cos</button><button onclick="append('tan(')">tan</button><button onclick="append('log(')">log</button>
      <button onclick="append('sqrt(')">√</button><button onclick="append('exp(')">exp</button><button onclick="append('^')">x^y</button><button onclick="append('pi')">π</button>
      <button onclick="append('e')">e</button>
      <button onclick="append('%')">%</button><button onclick="append('fact(')">fact</button><button onclick="append('rad(')">rad</button><button onclick="append('deg(')">deg</button>
    </div>
  </div>

  <div id="tab-tools" class="hidden">
    <div class="row"><input type="number" id="tax-amount" placeholder="Amount"><input type="number" id="tax-rate" placeholder="Rate %"><button class="orange" onclick="calcTax()">Tax</button></div>
    <div class="row"><input type="number" id="tip-amount" placeholder="Bill"><input type="number" id="tip-rate" placeholder="Tip %"><button class="orange" onclick="calcTip()">Tip</button></div>
    <div class="row"><input type="number" id="len-val" placeholder="Value"><select id="len-from"><option>mi</option><option>km</option><option>ft</option><option>m</option></select><select id="len-to"><option>km</option><option>mi</option><option>m</option><option>ft</option></select><button class="orange" onclick="convertLength()">→</button></div>
    <div class="row"><input type="number" id="temp-val" placeholder="Temp"><select id="temp-from"><option>F</option><option>C</option><option>K</option></select><select id="temp-to"><option>C</option><option>F</option><option>K</option></select><button class="orange" onclick="convertTemp()">→</button></div>
    <div class="row"><input type="number" id="comp-principal" placeholder="Principal"><input type="number" id="comp-rate" placeholder="Rate %"><input type="number" id="comp-years" placeholder="Years"><button class="orange" onclick="compound()">FV</button></div>
  </div>
</div>

<script>
(function() {
  /* ----- UmbrilFloat with shadow damping ----- */
  function UF(v) {
    this.val = Number(v);
    if (isNaN(this.val)) throw "Not a number";
    this.shadow = Math.abs(this.val) * Number.EPSILON;
  }
  UF.prototype = {
    add: function(o) { if(!(o instanceof UF)) o = new UF(o); var r = Object.create(UF.prototype); r.val = this.val + o.val; r.shadow = this.shadow + o.shadow; return r; },
    sub: function(o) { if(!(o instanceof UF)) o = new UF(o); return this.add(new UF(-o.val)); },
    mul: function(o) { if(!(o instanceof UF)) o = new UF(o); var r = Object.create(UF.prototype); r.val = this.val * o.val; r.shadow = Math.abs(this.val) * o.shadow + Math.abs(o.val) * this.shadow + this.shadow * o.shadow; return r; },
    div: function(o) { if(!(o instanceof UF)) o = new UF(o); var r = Object.create(UF.prototype); r.val = this.val / o.val; r.shadow = (Math.abs(this.val)*o.shadow)/Math.max(o.val*o.val,1e-300) + this.shadow/Math.max(Math.abs(o.val),1e-300); return r; },
    pow: function(o) { if(!(o instanceof UF)) o = new UF(o); return new UF(Math.pow(this.val, o.val)); },
    toString: function() { if (Math.abs(this.val) < 1e-12) return "0"; var s = this.val.toPrecision(15); if (s.indexOf('.')!==-1) s = s.replace(/\.?0+$/,''); return s; }
  };

  /* ----- Shunting-yard evaluator ----- */
  var OP = { '+':[1,'L'], '-':[1,'L'], '*':[2,'L'], '/':[2,'L'], '^':[3,'R'] };
  var FN = ['sqrt','sin','cos','tan','log','exp','fact','rad','deg'];

  function tokenize(s) {
    s = s.replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-').replace(/\*\*/g,'^');
    s = s.replace(/(\d)\(/g,'$1*(');   // implicit multiplication
    var tokens = [], i = 0;
    while (i < s.length) {
      var ch = s[i];
      if (ch === ' ') { i++; continue; }
      if ((ch>='0' && ch<='9') || ch==='.') {
        var num = '';
        while (i < s.length && ((s[i]>='0' && s[i]<='9') || s[i]==='.')) num += s[i++];
        tokens.push({t:'num', v:parseFloat(num)});
        continue;
      }
      if (ch === '(') { tokens.push({t:'lpar'}); i++; continue; }
      if (ch === ')') { tokens.push({t:'rpar'}); i++; continue; }
      if (ch in OP) { tokens.push({t:'op', v:ch}); i++; continue; }
      if (s.substr(i, 2) === 'pi') { tokens.push({t:'num', v:Math.PI}); i+=2; continue; }
      if (s[i] === 'e' && (i+1>=s.length || s[i+1]<'a'||s[i+1]>'z')) { tokens.push({t:'num', v:Math.E}); i++; continue; }
      var found = false;
      for (var j = 0; j < FN.length; j++) {
        var f = FN[j];
        if (s.substr(i, f.length) === f) {
          tokens.push({t:'fn', v:f}); i+=f.length; found = true; break;
        }
      }
      if (found) continue;
      i++; // ignore unknown
    }
    // insert implicit multiplication: number before '(' or function
    for (var k = 0; k < tokens.length-1; k++) {
      if ((tokens[k].t === 'num' || tokens[k].t === 'rpar') &&
          (tokens[k+1].t === 'num' || tokens[k+1].t === 'lpar' || tokens[k+1].t === 'fn')) {
        tokens.splice(k+1, 0, {t:'op', v:'*'});
      }
    }
    return tokens;
  }

  function toRPN(tokens) {
    var out = [], stack = [];
    for (var i = 0; i < tokens.length; i++) {
      var tok = tokens[i];
      if (tok.t === 'num') {
        out.push(tok);
      } else if (tok.t === 'fn') {
        stack.push(tok);
      } else if (tok.t === 'op') {
        while (stack.length && stack[stack.length-1].t === 'op' &&
               ((OP[tok.v][1]==='L' && OP[stack[stack.length-1].v][0] >= OP[tok.v][0]) ||
                (OP[tok.v][1]==='R' && OP[stack[stack.length-1].v][0] >  OP[tok.v][0]))) {
          out.push(stack.pop());
        }
        stack.push(tok);
      } else if (tok.t === 'lpar') {
        stack.push(tok);
      } else if (tok.t === 'rpar') {
        while (stack.length && stack[stack.length-1].t !== 'lpar') out.push(stack.pop());
        if (stack.length && stack[stack.length-1].t === 'lpar') stack.pop(); // remove '('
        if (stack.length && stack[stack.length-1].t === 'fn') out.push(stack.pop()); // function
      }
    }
    while (stack.length) out.push(stack.pop());
    return out;
  }

  function evalRPN(rpn) {
    var stack = [];
    for (var i = 0; i < rpn.length; i++) {
      var tok = rpn[i];
      if (tok.t === 'num') {
        stack.push(new UF(tok.v));
      } else if (tok.t === 'op') {
        var b = stack.pop(), a = stack.pop();
        if (tok.v === '+') stack.push(a.add(b));
        else if (tok.v === '-') stack.push(a.sub(b));
        else if (tok.v === '*') stack.push(a.mul(b));
        else if (tok.v === '/') stack.push(a.div(b));
        else if (tok.v === '^') stack.push(a.pow(b));
      } else if (tok.t === 'fn') {
        var arg = stack.pop();
        var v = arg.val;
        switch (tok.v) {
          case 'sqrt': stack.push(new UF(Math.sqrt(v))); break;
          case 'sin':  stack.push(new UF(Math.sin(v))); break;
          case 'cos':  stack.push(new UF(Math.cos(v))); break;
          case 'tan':  stack.push(new UF(Math.tan(v))); break;
          case 'log':  stack.push(new UF(Math.log(v))); break;
          case 'exp':  stack.push(new UF(Math.exp(v))); break;
          case 'fact':
            if (v<0 || !Number.isInteger(v)) stack.push(new UF(NaN));
            else { var r=1; for (var j=2;j<=v;j++) r*=j; stack.push(new UF(r)); }
            break;
          case 'rad': stack.push(new UF(v * Math.PI/180)); break;
          case 'deg': stack.push(new UF(v * 180/Math.PI)); break;
        }
      }
    }
    return stack[0].toString();
  }

  function safeEval(expr) {
    try {
      var tokens = tokenize(expr);
      var rpn = toRPN(tokens);
      return evalRPN(rpn);
    } catch(e) { return 'Error'; }
  }

  /* ----- UI ----- */
  window.input = '0';
  window.lastResult = '0';
  window.memoryVal = 0;

  window.updateDisplay = function() {
    document.getElementById('input').textContent = window.input || '0';
    document.getElementById('result').textContent = window.lastResult;
  };
  window.append = function(s) {
    if (window.input === '0' && s !== '.') window.input = '';
    window.input += s;
    window.updateDisplay();
  };
  window.undo = function() { window.input = window.input.slice(0,-1); if (!window.input) window.input='0'; window.updateDisplay(); };
  window.clearAll = function() { window.input='0'; window.lastResult='0'; window.updateDisplay(); };
  window.calculate = function() {
    if (!window.input) return;
    var open = (window.input.match(/\(/g) || []).length;
    var close = (window.input.match(/\)/g) || []).length;
    var expr = window.input + ')'.repeat(open - close);
    var res = safeEval(expr);
    window.lastResult = res;
    window.input = res;
    window.updateDisplay();
  };
  window.memory = function(a) {
    var v = parseFloat(window.lastResult);
    if (isNaN(v)) v = 0;
    if (a === 'M+') window.memoryVal += v;
    else if (a === 'MR') { window.input = String(window.memoryVal); window.lastResult = window.input; }
    else if (a === 'MC') window.memoryVal = 0;
    window.updateDisplay();
  };
  window.switchTab = function(t) {
    ['calc','sci','tools'].forEach(function(x){ document.getElementById('tab-'+x).classList.add('hidden'); });
    document.getElementById('tab-'+t).classList.remove('hidden');
    var tabs = document.querySelectorAll('.tab');
    for (var i=0; i<tabs.length; i++) tabs[i].classList.remove('active');
    event.target.classList.add('active');
  };
  /* tools remain unchanged */
  window.calcTax = function(){ var a=+document.getElementById('tax-amount').value; var r=+document.getElementById('tax-rate').value||8.5; window.lastResult=(a*(1+r/100)).toFixed(2); window.input=window.lastResult; window.updateDisplay(); };
  window.calcTip = function(){ var a=+document.getElementById('tip-amount').value; var r=+document.getElementById('tip-rate').value||18; window.lastResult=(a*(1+r/100)).toFixed(2); window.input=window.lastResult; window.updateDisplay(); };
  window.convertLength = function(){ var v=+document.getElementById('len-val').value; var from=document.getElementById('len-from').value; var to=document.getElementById('len-to').value; var toM={mi:1609.344,km:1000,ft:0.3048,m:1},fromM={mi:1/1609.344,km:1/1000,ft:1/0.3048,m:1}; var m=v*toM[from]; window.lastResult=(m*fromM[to]).toFixed(4); window.input=window.lastResult; window.updateDisplay(); };
  window.convertTemp = function(){ var v=+document.getElementById('temp-val').value; var from=document.getElementById('temp-from').value; var to=document.getElementById('temp-to').value; var c; if(from==='C') c=v; else if(from==='F') c=(v-32)*5/9; else c=v-273.15; var r; if(to==='C') r=c; else if(to==='F') r=c*9/5+32; else r=c+273.15; window.lastResult=r.toFixed(2); window.input=window.lastResult; window.updateDisplay(); };
  window.compound = function(){ var P=+document.getElementById('comp-principal').value; var r=(+document.getElementById('comp-rate').value||5)/100; var t=+document.getElementById('comp-years').value||1; window.lastResult=(P*Math.pow(1+r,t)).toFixed(2); window.input=window.lastResult; window.updateDisplay(); };
  window.updateDisplay();
})();
</script>
</body>
</html>
